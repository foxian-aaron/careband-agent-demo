name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test
      - name: Build
        run: npm run build
      - name: Prepare Pages artifact root
        run: |
          mkdir -p pages-artifact
          cp -R dist/. pages-artifact/
      - name: Checkout v0.2 demo branch
        uses: actions/checkout@v4
        with:
          ref: careband-v0.2-apple-health
          path: .pages-v02-source
      - name: Install v0.2 frontend dependencies
        working-directory: .pages-v02-source
        run: npm ci
      - name: Test v0.2 frontend
        working-directory: .pages-v02-source
        run: npm test
      - name: Build v0.2 frontend
        working-directory: .pages-v02-source
        run: npm run build
      - name: Add v0.2 demo under /v0.2
        run: |
          mkdir -p pages-artifact/v0.2
          cp -R .pages-v02-source/dist/. pages-artifact/v0.2/
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-artifact

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
